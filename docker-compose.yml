services:
  blipchat-rabbitmq:
    image: rabbitmq:3-management
    container_name: blipchat-rabbitmq
    ports:
      - "${RABBITMQ_PORT:-12001}:5672"
      - "${RABBITMQ_MANAGEMENT_PRT:-15672}:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_PASSWORD:-guest}
    networks:
      - blipchat-network

  auth-database:
    image: mysql:8.0
    container_name: blipchat-auth-db
    environment:
      MYSQL_DATABASE: ${AUTH_DB_NAME:-blipchat_auth_service}
      MYSQL_USER: ${AUTH_DB_USER:-blipchat_auth_user}
      MYSQL_PASSWORD: ${AUTH_DB_PASSWORD:-blipchat_auth_password}
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD:-root_password}
    ports:
      - "${AUTH_DB_PORT:-8206}:3306"
    volumes:
      - auth-db-data:/var/lib/mysql
    networks:
      - blipchat-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${AUTH_DB_ROOT_PASSWORD:-root_password}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
    restart: unless-stopped    

  redis:
    image: redis:7
    container_name: blipchat-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - blipchat-network


  chat-database:
    image: mongo:7
    container_name: blipchat-chat-db
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-password}
    volumes:
      - mongo-db-data:/data/db
    networks:
      - blipchat-network


  user-database:
    image: postgres:16
    container_name: blipchat-user-db
    environment:
      - POSTGRES_DB=${USER_DB_NAME:-blipchat_user-service}
      - POSTGRES_USER=${USER_DB_USER:-blipchat_user}
      - POSTGRES_PASSWORD=${USER_DB_PASSWORD:-blipchat_password}
    ports:
      - "${USER_DB_PORT:-8207}:5432"
    volumes:
      - user-db-data:/var/lib/postgresql/data
    networks:
      - blipchat-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${USER_DB_USER:-blipchat_user} -d ${USER_DB_NAME:-blipchat_user-service}"]
      interval: 10s
      timeout: 5s
      retries: 5
  
    restart: unless-stopped

volumes:
  auth-db-data:
  mongo-db-data:
  user-db-data:


networks:
  blipchat-network:
    driver: bridge

